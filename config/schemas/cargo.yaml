name: rust-cargo
command_pattern: "^cargo"
rules:
  - name: DependencyCompiling
    pattern: "^\\s*(Downloading|Compiling|Downloaded|Finished|Checking)\\s+[a-zA-Z0-9_-]+\\s+v[0-9.]+"
    action: synthesize
    priority: 5
  - name: LocalCompiling
    pattern: "^\\s*Compiling\\s+[a-zA-Z0-9_-]+\\s+v[0-9.]+\\s+\\(.*\\)"
    action: synthesize
    priority: 5
  - name: BuildFinished
    pattern: "^\\s*Finished\\s+.*"
    action: keep
    priority: 10
  - name: LocalWarnings
    pattern: "^warning:.*"
    action: keep
    priority: 10
  - name: LocalErrors
    pattern: "^error.*"
    action: keep
    priority: 10
  - name: TestSummary
    pattern: "test result: .*"
    action: keep
    priority: 10
  - name: DownloadingCrates
    pattern: "^\\s*Downloading crates.*"
    action: synthesize
    priority: 5
