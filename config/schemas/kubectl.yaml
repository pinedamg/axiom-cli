name: cloud-kubectl
command_pattern: "^(kubectl|k)"
rules:
  - name: ResourceLine
    pattern: "^[a-z0-9-]+\\s+[0-9/]+\\s+(Running|Completed|Terminating|Pending|CrashLoopBackOff|Error)\\s+.*"
    action: synthesize
    priority: 15
  - name: EventsInfo
    pattern: "^(Type|Reason|Age|From|Message).*"
    action: keep
    priority: 10
  - name: DescribeLabels
    pattern: "^(Labels|Annotations|Selector):.*"
    action: synthesize
    priority: 5
  - name: ManagedFields
    pattern: ".*managedFields:.*"
    action: hidden
    priority: 10
