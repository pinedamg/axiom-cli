name: linux-ls
command_pattern: "^ls.*"
rules:
  - name: SynthesizeLongListing
    pattern: "^[dlxbcps-][rwx-]{9}.*"
    action: synthesize
    priority: 10
  - name: SynthesizeStandard
    pattern: "^[^\\s].*\\s{2,}.*"
    action: synthesize
    priority: 5
  - name: TotalSummary
    pattern: "^total\\s\\d+"
    action: collapse
    priority: 8
  - name: HiddenFiles
    pattern: "^\\..*"
    action: redact # Privacidad por defecto para archivos ocultos en V3
    priority: 6
