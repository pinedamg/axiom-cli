name: linux-ps
command_pattern: "^ps.*"
rules:
  - name: Header
    pattern: "^(USER|PID|%CPU|%MEM).*"
    action: collapse
    priority: 20
  - name: ProcessTable
    pattern: "^[a-zA-Z0-9_-]+\\s+\\d+\\s+.*"
    action: synthesize
    priority: 15
  - name: KernelThreads
    pattern: ".*\\[[a-zA-Z0-9/-]+\\].*"
    action: synthesize
    priority: 18
